name: LinkToGSI Modular Builder

on:
  workflow_dispatch:
    inputs:
      ROM_URL:
        description: 'Direct link to firmware zip'
        required: true
      rom_type:
        description: 'ROM type (e.g. Pixel, HyperOS, etc)'
        required: true

jobs:
  build-gsi:
    runs-on: ubuntu-latest

    steps:
    - name: ⬇️ Checkout repo
      uses: actions/checkout@v3

    - name: 🛠️ Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          unzip zip p7zip-full p7zip-rar rsync util-linux wget \
          brotli lz4 python3-pip protobuf-compiler gawk
        pip3 install backports.lzma protobuf pycryptodome extract-dtb tqdm

    - name: 📁 Setup directories
      run: |
        rm -rf DownloadedROMs UnpackedROMs Output
        mkdir -p DownloadedROMs UnpackedROMs Output

    - name: 🌐 Download firmware
      run: |
        wget --progress=bar:force -O DownloadedROMs/firmware.zip "${{ github.event.inputs.ROM_URL }}"

    - name: 🛠️ Run LinkToGSI.sh
      run: |
        sudo bash LinkToGSI.sh "${{ github.event.inputs.ROM_URL }}" "${{ github.event.inputs.rom_type }}"

    - name: 📦 Pack image with 7z split (2GB)
      run: |
        IMAGE=$(find Output -name "*.img" | head -n1)
        if [ -f "$IMAGE" ]; then
          7z a -v2000m -tzip FoxetGSIROM.zip "$IMAGE"
        else
          echo "❌ No image found to pack"
          exit 1
        fi

    - name: 🚀 Upload to GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: "FoxetGSI-${{ github.run_id }}"
        name: "FoxetGSI Build ${{ github.run_id }}"
        files: FoxetGSIROM.zip*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
