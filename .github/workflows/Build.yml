name: LinkToGSI Inline Workflow

on:
  workflow_dispatch:
    inputs:
      firmware_url:
        description: 'Direct link to firmware zip'
        required: true
      rom_type:
        description: 'ROM type (Generic, HyperOS, etc)'
        required: true

jobs:
  build-gsi:
    runs-on: ubuntu-latest

    steps:
    - name: ⬇️ Checkout repo
      uses: actions/checkout@v3

    - name: 🛠️ Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          unace unrar zip unzip p7zip-full p7zip-rar sharutils rar \
          uudeview mpack arj cabextract rename liblzma-dev python3-pip \
          brotli lz4 protobuf-compiler git gawk wget jq util-linux rsync
        pip3 install tqdm

    - name: 📁 Setup directories
      run: |
        rm -rf DownloadedROMs UnpackedROMs Output OutputSplit
        mkdir -p DownloadedROMs UnpackedROMs UnpackedROMs/system UnpackedROMs/temp_mount Output OutputSplit

    - name: 🔧 Clone Firmware_extractor
      run: |
        git clone --recurse-submodules https://github.com/erfanoabdi/Firmware_extractor.git Tools/Firmware_extractor

    - name: 🌐 Download and extract firmware
      run: |
        wget -O DownloadedROMs/firmware.zip "${{ github.event.inputs.firmware_url }}"
        bash Tools/Firmware_extractor/extractor.sh DownloadedROMs/firmware.zip UnpackedROMs/

    - name: 🧩 Mount and unpack partitions
      run: |
        partitions="vendor system system_ext product optics prism mi_ext my_bigball my_engineering my_manifest my_region my_carrier my_heytap my_product my_stock"
        for partition in $partitions; do
          if [[ -f "UnpackedROMs/$partition.img" ]]; then
            echo "🔍 Unpacking $partition.img"
            mkdir -p "UnpackedROMs/$partition"
            sudo mount -o loop,ro,nosuid,nodev -t ext4 "UnpackedROMs/$partition.img" UnpackedROMs/temp_mount || sudo mount "UnpackedROMs/$partition.img" UnpackedROMs/temp_mount
            rsync -a --no-perms --no-owner --no-group UnpackedROMs/temp_mount/ UnpackedROMs/$partition/ || echo "⚠️ rsync fallback for $partition"
            sudo umount -R UnpackedROMs/temp_mount
          fi
        done

    - name: 🔀 Reposition partitions into system
      run: |
        partitions="vendor system_ext product optics prism mi_ext my_bigball my_engineering my_manifest my_region my_carrier my_heytap my_product my_stock"
        for partition in $partitions; do
          if [ -d "UnpackedROMs/system/$partition" ] && [ ! -L "UnpackedROMs/system/$partition" ]; then
            target="UnpackedROMs/system"
          elif [ -d "UnpackedROMs/system/system/$partition" ] && [ ! -L "UnpackedROMs/system/system/$partition" ]; then
            target="UnpackedROMs/system/system"
          else
            continue
          fi
          if [ -d "UnpackedROMs/$partition" ]; then
            echo "📦 Moving $partition into $target"
            mv "UnpackedROMs/$partition" "$target/"
          fi
        done

    - name: 🛠️ Run FoxetGSITool
      run: |
        sudo bash FoxetGSITool.sh UnpackedROMs/system "${{ github.event.inputs.rom_type }}"

    - name: 🧩 Split image if >2GB
      run: |
        IMAGE=$(find Output -name "*.img" | head -n1)
        if [ -f "$IMAGE" ]; then
          SIZE=$(stat -c%s "$IMAGE")
          if [ "$SIZE" -gt $((2 * 1024 * 1024 * 1024)) ]; then
            echo "🧩 Splitting image..."
            split -b 1900M "$IMAGE" "OutputSplit/$(basename $IMAGE).part"
          else
            cp "$IMAGE" OutputSplit/
          fi
        else
          echo "❌ No image found in Output/"
          exit 1
        fi

    - name: 🚀 Upload to GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: "AutoGSI-${{ github.run_id }}"
        name: "AutoGSI Build ${{ github.run_id }}"
        files: OutputSplit/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
